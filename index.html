<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>통계적 보험설계 추천</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>body{font-family:system-ui,sans-serif}</style>
</head>
<body class="bg-gray-50 py-8">
<div class="max-w-6xl mx-auto px-4">
  <h1 class="text-4xl font-bold text-center mb-2 text-indigo-700">통계적 보험설계 추천 플랫폼</h1>
  <p class="text-center text-gray-600 mb-8">Monte Carlo Simulation 기반 고객 최적 설계</p>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="bg-white p-8 rounded-2xl shadow-xl">
      <h2 class="text-2xl font-semibold mb-6">고객 정보 입력</h2>
      <div class="space-y-6">
        <div><label class="block text-sm font-medium mb-1">나이</label><input id="age" type="number" value="35" class="w-full p-3 border rounded-xl"></div>
        <div><label class="block text-sm font-medium mb-1">연 소득 (만원)</label><input id="income" type="number" value="6000" class="w-full p-3 border rounded-xl"></div>
        <div><label class="block text-sm font-medium mb-1">부양 가족 수</label><input id="family" type="number" value="2" class="w-full p-3 border rounded-xl"></div>
        <div><label class="block text-sm font-medium mb-1">위험 선호도 (1:보수적 ~ 5:적극적)</label><input id="riskTol" type="range" min="1" max="5" value="2" class="w-full"></div>
        <button onclick="runAnalysis()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl text-lg font-semibold">분석 및 추천 받기</button>
      </div>
    </div>

    <div id="results" class="hidden bg-white p-8 rounded-2xl shadow-xl">
      <h2 class="text-2xl font-semibold mb-6">추천 결과</h2>
      <div id="summary" class="mb-8"></div>
      <canvas id="monteChart" class="mb-8"></canvas>
      <div id="recommendations" class="space-y-4"></div>
    </div>
  </div>
</div>

<script>
const policies = [
  {name:"종신보험", premium:120, coverage:50000, coversEvent:true},
  {name:"실손의료", premium:45, coverage:10000, coversEvent:true},
  {name:"암보험", premium:35, coverage:30000, coversEvent:true}
];

function monteCarlo(profile, selected) {
  let outcomes = [];
  for(let i = 0; i < 3000; i++) {
    let wealth = profile.income * 25;
    if(Math.random() < 0.085) {
      wealth -= 45000;
      selected.forEach(p => { if(p.coversEvent) wealth += p.coverage * 0.65; });
    }
    wealth -= selected.reduce((sum, p) => sum + p.premium*12, 0);
    outcomes.push(Math.max(wealth, 0));
  }
  const avg = outcomes.reduce((a,b) => a+b) / 3000;
  const ruin = (outcomes.filter(o => o < profile.income*8).length / 3000) * 100;
  return {avgWealth: Math.round(avg), ruinProb: ruin.toFixed(1), outcomes};
}

function runAnalysis() {
  const income = parseFloat(document.getElementById('income').value) || 6000;
  const profile = {income};
  const bestCombo = [policies[0], policies[1]];
  const sim = monteCarlo(profile, bestCombo);

  document.getElementById('results').classList.remove('hidden');
  document.getElementById('summary').innerHTML = `
    <div class="grid grid-cols-3 gap-4 text-center">
      <div class="bg-green-50 p-4 rounded-xl"><div class="text-sm text-gray-500">파산 위험</div><div class="text-3xl font-bold text-green-600">${sim.ruinProb}%</div></div>
      <div class="bg-blue-50 p-4 rounded-xl"><div class="text-sm text-gray-500">평균 잔여자산</div><div class="text-3xl font-bold">${(sim.avgWealth/10000).toFixed(1)}억</div></div>
      <div class="bg-indigo-50 p-4 rounded-xl"><div class="text-sm text-gray-500">연 보험료</div><div class="text-3xl font-bold">${bestCombo.reduce((s,p)=>s+p.premium*12,0)}만원</div></div>
    </div>
  `;

  let rec = '';
  bestCombo.forEach(p => {
    rec += `<div class="border border-gray-200 p-5 rounded-2xl"><strong>${p.name}</strong><br>연 ${p.premium*12}만원 | 최대 ${p.coverage/10000}억 보장</div>`;
  });
  document.getElementById('recommendations').innerHTML = rec;

  new Chart(document.getElementById('monteChart'), {
    type: 'bar',
    data: {
      labels: ['평균', '최저', '최고'],
      datasets: [{ label: '시뮬레이션 자산 분포', data: [sim.avgWealth, Math.min(...sim.outcomes), Math.max(...sim.outcomes)], backgroundColor: '#4f46e5' }]
    }
  });
}
</script>
</body>
</html>
