<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartGuard - 고객 맞춤 보험 추천</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .risk-bar { height: 8px; background: linear-gradient(to right, #22c55e, #eab308, #ef4444); }
  </style>
</head>
<body class="bg-slate-50 py-10">
  <div class="max-w-6xl mx-auto px-6">
    <h1 class="text-4xl font-bold text-center mb-2">SmartGuard</h1>
    <p class="text-center text-slate-600 mb-10">가족력·생활습관 기반 통계적 보험 추천</p>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- 입력 -->
      <div class="lg:col-span-5 bg-white rounded-3xl shadow p-8">
        <h2 class="text-2xl font-semibold mb-6">고객 정보</h2>
        <div class="space-y-6">
          <div><label class="block text-sm mb-1">나이</label><input id="age" type="number" value="42" class="w-full p-4 border rounded-2xl"></div>
          <div><label class="block text-sm mb-1">연 소득 (만원)</label><input id="income" type="number" value="6500" class="w-full p-4 border rounded-2xl"></div>
          <div><label class="block text-sm mb-1">부양 가족 수</label><input id="family" type="number" value="3" class="w-full p-4 border rounded-2xl"></div>
          
          <div>
            <label class="block text-sm mb-2">가족력 (해당되는 항목 체크)</label>
            <div class="grid grid-cols-2 gap-2 text-sm">
              <label><input type="checkbox" id="famCancer" class="mr-2"> 암</label>
              <label><input type="checkbox" id="famHeart" class="mr-2"> 심혈관질환</label>
              <label><input type="checkbox" id="famDiabetes" class="mr-2"> 당뇨</label>
            </div>
          </div>

          <div>
            <label class="block text-sm mb-2">생활습관</label>
            <select id="smoking" class="w-full p-4 border rounded-2xl">
              <option value="0">비흡연</option>
              <option value="1">가끔 피움</option>
              <option value="2">흡연</option>
            </select>
          </div>

          <div>
            <label class="block text-sm mb-1">운동 빈도 (주당)</label>
            <input id="exercise" type="range" min="0" max="7" value="3" class="w-full accent-indigo-600">
            <div class="text-center text-sm text-slate-500" id="exerciseVal">주 3회</div>
          </div>
        </div>

        <button onclick="runRecommendation()" class="mt-10 w-full bg-indigo-600 text-white py-5 rounded-2xl text-lg font-medium">통계 기반 추천 받기</button>
      </div>

      <!-- 결과 -->
      <div id="results" class="lg:col-span-7 hidden bg-white rounded-3xl shadow p-8">
        <h2 class="text-2xl font-semibold mb-6">📊 추천 보험 포트폴리오</h2>
